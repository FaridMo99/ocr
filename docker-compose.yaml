services:
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    image: ocr-frontend
    ports:
      - "80:8080"
    networks:
      - ocr-network

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    image: ocr-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    networks:
      - ocr-network

  server:
    build:
      context: ./server
      dockerfile: dockerfile
    image: ocr-server
    ports:
      - "3000:3000"
    networks:
      - ocr-network
 

networks:
  ocr-network:
    driver: bridge